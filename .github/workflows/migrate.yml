name: Migrate MLBB workbook to Supabase

on:
  push:
    branches: [main]
    paths:
      - 'mobile_legends_heroes_updated.xlsx'
      - 'migrate_to_supabase.py'
      - 'schema.sql'
  workflow_dispatch: {}

jobs:
  migrate:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f "requirements.txt" ]; then
            pip install -r requirements.txt
          else
            pip install openpyxl supabase
          fi

      - name: Pre-flight Diagnostic Check
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: |
          if [ ! -f "mobile_legends_heroes_updated.xlsx" ]; then
            echo "ERROR: mobile_legends_heroes_updated.xlsx is missing from repository root."
            ls -la
            exit 1
          fi

          if [ ! -f "migrate_to_supabase.py" ]; then
            echo "ERROR: migrate_to_supabase.py is missing from repository root."
            exit 1
          fi

          if [ -z "$SUPABASE_URL" ]; then
            echo "ERROR: Secret SUPABASE_URL is not configured under Settings > Secrets and variables > Actions."
            exit 1
          fi

          if [ -z "$SUPABASE_SERVICE_KEY" ]; then
            echo "ERROR: Secret SUPABASE_SERVICE_KEY is not configured under Settings > Secrets and variables > Actions."
            exit 1
          fi

          echo "Pre-flight checks passed successfully."

      - name: Run migration
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: python migrate_to_supabase.py mobile_legends_heroes_updated.xlsx